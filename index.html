<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Personal Library </title>
    <!--tailwind css-->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!--font awosome cdn link-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!--font link-->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&family=Playfair+Display&display=swap" rel="stylesheet">
<link rel="stylesheet" href="index.css">
</head>

<body>
    <!--Common nav bar section-->
    <nav>
  <!-- Logo -->
  
  <a href="#" class="logo">
     <img src="./image/logo.jpeg" alt="logo" height="50px" width="50px">
    Personal Library
  </a>

  <!-- Nav Links -->
  <ul class="nav-links">
    <li>
      <a href="home.html" >
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 1L2 6v9h4v-4h4v4h4V6L8 1z"/></svg>
        Home
      </a>
    </li>
    <li>
      <a href="collections.html">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M2 4h12v1.5H2zm1.5 3h9v1.5h-9zm2 3h5v1.5h-5z"/></svg>
        Collection
      </a>
    </li>
    <li>
      <a href="mybooks.html">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M4 2h8a1 1 0 011 1v12l-5-2.5L3 15V3a1 1 0 011-1z"/></svg>
        My Books
      </a>
    </li>
    <li>
      <a href="goals.html">
        <svg viewBox="0 0 16 16" fill="currentColor"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.5" fill="none"/><circle cx="8" cy="8" r="2" fill="currentColor"/></svg>
        Goals
      </a>
    </li>
    <li>
      <a href="feedback.html">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M2 3h12v8H9l-3 3V11H2z"/></svg>
        Feedback
      </a>
    </li>
    <li>
      <a href="index.html" class="active">
       Login
      </a>
    </li>
    <li>
      <a href="register.html" >
        Register
      </a>
    </li>
  </ul>

</nav>

    <!--content-->
    <section class="flex items-center justify-center min-h-screen p-3">

        <div class="bg-blue-50 flex flex-col md:flex-row items-center rounded-sm justify-center p-5 gap-6 shadow-lg ">

            <!-- Image -->
            <img src="./image/book.jpg" class="w-full rounded-sm md:w-[450px] h-auto  opacity-120">

            <!-- Form -->
            <div class="p-5 md:p-8  w-full md:w-[400px]">

                <span class="bg-sky-100 rounded-full p-2  text-sm">WELCOME BACK💗!</span>

                <h1 class="text-2xl md:text-3xl font-serif mt-3 text-blue-800">
                    Login Personal Library
                </h1>

                <p class="text-gray-500 mt-2 text-sm md:text-base">
                    New here? <span class="text-blue-400"><a href="register.html">Create a free account</a></span>
                </p>

                <form id="loginForm" class=" mt-4 space-y-3">

                    <div>
                        <span id="errorMsg"
                            class="bg-yellow-100 p-2 border-2 border-red-400  animate-bounce hidden rounded-sm text-sm  ">
                            ⚠️ Email or password incorrect. Please try again
                        </span><br>

                        <label class="text-lg mt-3 block">Email Address<i
                            class="fa-solid ml-1 fa-envelope-circle-check" style="color: rgb(14, 1, 14);"></i></label>

                        <input id="email" type="text" placeholder="example@gmail.com"
                            class="border-2 border-neutral-300 outline-none p-2 w-full rounded hover:border-blue-800">
                    </div>

                    <div>
                        <label class="text-lg">Password</label><i class="fa-solid ml-1 fa-key"
                            style="color: rgb(14, 1, 14);"></i><br>
                        <input id="password" type="password" placeholder="Password must 6 digits"
                            class="border-2 border-neutral-300 outline-none p-2 w-full rounded hover:border-blue-800">
                    </div>

                    <button class="bg-blue-400 text-white px-4 py-2  rounded w-full mt-2">
                        Login ➝
                    </button>

                </form>
            </div>

        </div>
    </section>
    <!--js link-->
    <script src="login.js"></script>
</body>

</html>
