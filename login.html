<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Personal Library </title>
    <!--tailwind css-->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!--font awosome cdn link-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!--font link-->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&family=Playfair+Display&display=swap" rel="stylesheet">

</head>

<body>
    <!-- Navbar -->
    <nav class="flex items-center justify-between px-4 py-2 shadow-sm mt-1 flex-wrap">

        <!-- Logo -->
        <h1 class="font-[Poppins] flex items-center font-bold text-lg md:text-3xl text-[#6877e0]">
            <img width="60" height="60" src="./image/login logo.jpeg" alt="books" />
            Personal Library 
        </h1>

        <!-- Mobile Menu Icon -->
        <svg   xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
            class="w-6 h-6 md:hidden items-end cursor-pointer">
            <path stroke-linecap="round" stroke-linejoin="round"
                d="M6.429 9.75 2.25 12l4.179 2.25m0-4.5 5.571 3 5.571-3m-11.142 0L2.25 7.5 12 2.25l9.75 5.25-4.179 2.25m0 0L21.75 12l-4.179 2.25m0 0 4.179 2.25L12 21.75 2.25 16.5l4.179-2.25" />
        </svg>

        <!-- Menu -->
        <ul class="hidden md:flex items-center gap-6 text-lg">

            <li>
                <a href="#" class="text-gray-400 hover:underline hover:text-black hover:bg-gray-200 px-3 py-2 rounded-full transition">
                    Home <i class="fa-brands fa-houzz"></i>
                </a>
            </li>

            <li>
                <a href="#" class="text-gray-400 hover:underline hover:text-black hover:bg-gray-200 px-3 py-2 rounded-full transition">
                    Collection <i class="fa-solid fa-layer-group"></i>
                </a>
            </li>

            <li>
                <a href="mybooks.html" class="text-gray-400 hover:underline hover:text-black hover:bg-gray-200 px-3 py-2 rounded-full transition">
                    My Books <i class="fa-solid fa-book-bookmark"></i>
                </a>
            </li>

            <li>
                <a href="#" class="text-gray-400 hover:underline hover:text-black hover:bg-gray-200 px-3 py-2 rounded-full transition">
                    Goals <i class="fa-solid fa-bullseye"></i>
                </a>
            </li>

            <li>
                <a href="#"
                    class="bg-blue-400 text-white px-4 py-2 rounded-full hover:underline hover:bg-gray-200 hover:text-black transition">
                    Login
                </a>
            </li>

        </ul>
    </nav>
    <!--content-->
    <section class="flex items-center justify-center min-h-screen p-3">

        <div class="bg-blue-50 flex flex-col md:flex-row items-center rounded-sm justify-center p-5 gap-6 shadow-lg ">

            <!-- Image -->
            <img src="./image/book.jpg" class="w-full rounded-sm md:w-[450px] h-auto  opacity-120">

            <!-- Form -->
            <div class="p-5 md:p-8  w-full md:w-[400px]">

                <span class="bg-sky-100 rounded-full p-2  text-sm">WELCOME BACK💗!</span>

                <h1 class="text-2xl md:text-3xl font-serif mt-3 text-blue-800">
                    Login Personal Library
                </h1>

                <p class="text-gray-500 mt-2 text-sm md:text-base">
                    New here? <span class="text-blue-400">Create a free account</span>
                </p>

                <form id="loginForm" class=" mt-4 space-y-3">

                    <div>
                        <span id="errorMsg"
                            class="bg-yellow-100 p-2 border-2 border-red-400  animate-bounce hidden rounded-sm text-sm  ">
                            ⚠️ Email or password incorrect. Please try again
                        </span><br>

                        <label class="text-lg mt-3 block">Email Address<i
                            class="fa-solid ml-1 fa-envelope-circle-check" style="color: rgb(14, 1, 14);"></i></label>

                        <input id="email" type="text" placeholder="example@gmail.com"
                            class="border-2 border-neutral-300 outline-none p-2 w-full rounded hover:border-blue-800">
                    </div>

                    <div>
                        <label class="text-lg">Password</label><i class="fa-solid ml-1 fa-key"
                            style="color: rgb(14, 1, 14);"></i><br>
                        <input id="password" type="password" placeholder="Password must 6 digits"
                            class="border-2 border-neutral-300 outline-none p-2 w-full rounded hover:border-blue-800">
                    </div>

                    <button class="bg-blue-400 text-white px-4 py-2  rounded w-full mt-2">
                        Login ➝
                    </button>

                </form>
            </div>

        </div>
    </section>
    <!--js link-->
    <script src="login.js"></script>
</body>

</html>
