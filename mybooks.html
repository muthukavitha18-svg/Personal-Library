        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!--font link-->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&family=Playfair+Display&display=swap" rel="stylesheet">
    <!-- fontawesome link -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

</head>

<body>

    <nav class="flex items-center justify-between px-4 py-2 shadow-sm mt-1 flex-wrap">

        <!-- Logo -->

            <img width="60" height="60" src="./image/login logo.jpeg" alt="books" />
            Personal Library
        </h1>

        <!-- Mobile Menu Icon -->
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
            class="w-6 h-6 md:hidden items-end cursor-pointer">
            <path stroke-linecap="round" stroke-linejoin="round"
                d="M6.429 9.75 2.25 12l4.179 2.25m0-4.5 5.571 3 5.571-3m-11.142 0L2.25 7.5 12 2.25l9.75 5.25-4.179 2.25m0 0L21.75 12l-4.179 2.25m0 0 4.179 2.25L12 21.75 2.25 16.5l4.179-2.25" />
        </svg>

        <!-- Menu -->
        <ul class="hidden md:flex items-center gap-6 text-lg">

            <li>
                <a href="#"
                    class="text-gray-400 hover:underline hover:text-black hover:bg-gray-200 px-3 py-2 rounded-full transition">
                    Home <i class="fa-brands fa-houzz"></i>
                </a>
            </li>

            <li>
                <a href="#"
                    class="text-gray-400 hover:underline hover:text-black hover:bg-gray-200 px-3 py-2 rounded-full transition">
                    Collection <i class="fa-solid fa-layer-group"></i>
                </a>
            </li>

            <li>
                <a href="mybooks.html"
                    class="hover:underline text-black hover:bg-gray-200 px-3 py-2 rounded-full transition">
                    My Books <i class="fa-solid fa-book-bookmark"></i>
                </a>
            </li>

            <li>
                <a href="#"
                    class="text-gray-400 hover:underline hover:text-black hover:bg-gray-200 px-3 py-2 rounded-full transition">
                    Goals <i class="fa-solid fa-bullseye"></i>
                </a>
            </li>

            <li>
                <a href="#" class="size-4">
                    <i class="fa-solid fa-circle-user fa-2xl" style="color: rgb(104, 119, 224); "></i>
                </a>
            </li>

        </ul>
    </nav>

    <!-- --------------------------------------------------------------------------- -->
    <section>
        <div class=" mt-4 gap-5 flex justify-center">
            <div class="search_bar">
                <!-- <input type="text" placeholder="search books" class="border border-black rounded-full pd-3 p-1"> -->
                <!-- <button class="  border rounded-full p-1">Search</button> -->
            </div>

        </div>
    </section>



    <!-- -------------------Under progress animation-start------------------- -->
    <style>
        .container {
            text-align: center;
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Bouncing Dots */
        .dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 100px;
            margin-bottom: 30px;
        }

        .dot {
            width: 14px;
            height: 14px;
            background: #e94560;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .dot:nth-child(2) {
            animation-delay: 0.2s;
            background: #0f3460;
        }

        .dot:nth-child(3) {
            animation-delay: 0.4s;
            background: #533483;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: translateY(0);
            }

            40% {
                transform: translateY(-20px);
            }
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        p {
            color: #aaa;
            margin-bottom: 25px;
        }

        /* Progress Bar */
        .progress-bar {
            width: 250px;
            height: 6px;
            background: #333;
            border-radius: 10px;
            margin: 0 auto;
            overflow: hidden;
        }

        .progress-fill {
            width: 65%;
            height: 100%;
            background: #e94560;
            border-radius: 10px;
            animation: load 2s ease forwards;
        }

        @keyframes load {
            from {
                width: 0%;
            }

            to {
                width: 40%;
            }
        }

        span {
            font-size: 0.8rem;
            color: #666;
            display: block;
            margin-top: 10px;
        }
    </style>

    <section class="container">
        <div class="dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
        <h1>Crafting is on the progress </h1>
        <p>Hang tight!</p>
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
        <span>40% complete</span>
    </section>
    <!-- -------------------Under progress animation-end------------------- -->






</body>

</html>
