</head>
<body class="main">
  
  <nav class="flex items-center justify-between px-4 py-2 shadow-sm mt-1 flex-wrap bg-white">

    <!-- Logo -->
    <h1 class="font-[Poppins] flex items-center font-bold text-lg md:text-3xl text-[#6877e0]">
        <img width="60" height="60" src="./image/logo.jpeg" alt="books" />
        Personal Library 
    </h1>

    <!-- Mobile Menu Icon -->
    <svg xmlns="http://www.w3.org/2000/svg" 
        class="w-6 h-6 md:hidden cursor-pointer"
        fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round"
            d="M4 6h16M4 12h16M4 18h16" />
    </svg>

    <!-- Menu -->
    <ul class="hidden md:flex items-center gap-3 text-lg">

        <li>
            <a href="home.html" class="text-gray-400 hover:text-black hover:bg-gray-200 px-3 py-2 rounded-full transition">
                Home <i class="fa-brands fa-houzz"></i>
            </a>
        </li>

        <li>
            <a href="collections.html" class="text-gray-400 hover:text-black hover:bg-gray-200 px-3 py-2 rounded-full transition">
                Collection <i class="fa-solid fa-layer-group"></i>
            </a>
        </li>

        <li>
            <a href="mybooks.html" class="text-gray-400 hover:text-black hover:bg-gray-200 px-3 py-2 rounded-full transition">
                My Books <i class="fa-solid fa-book-bookmark"></i>
            </a>
        </li>

        <li>
            <a href="goals.html" class="text-gray-400 hover:text-black hover:bg-gray-200 px-3 py-2 rounded-full transition">
                Goals <i class="fa-solid fa-bullseye"></i>
            </a>
        </li>

        <li>
            <a href="feedback.html" class="text-gray-400 hover:text-black hover:bg-gray-200 px-3 py-2 rounded-full transition">
                Feedback
            </a>
        </li>

        <li>
            <a href="index.html"
                class="bg-blue-400 text-white px-4 py-2 rounded-full hover:bg-gray-200 hover:text-black transition">
                Login
            </a>
        </li>

        <li>
            <a href="register.html"
                class="bg-blue-400 text-white px-4 py-2 rounded-full hover:bg-gray-200 hover:text-black transition">
                Register
            </a>
        </li>

    </ul>
</nav>

<div class="card">

<!--Left Side-->
<div class="left">
<img src="./image/register.jpg" alt="Books">
<p>Join 10,000+ Book Lovers!</p>
</div>

<!--Right Side-->
<div class="right">
<h1>Create Your Account</h1>
<p>Already have an account? <a href="login.html">Login here</a></p>

<form id="regform">

  <div class="row">
<div class="form-group">
<label for="fname">First Name</label>
<input type="text" id="fname" name="fname" placeholder="John">
</div>

<div class="form-group">
<label for="lname">Last Name</label>
<input type="text" id="lname" name="lname" placeholder="Doe">
</div>
</div>
<div class="form-group">
<label for="email">Email Address</label>
<input type="email" id="email" name="email" placeholder="example@gmail.com">
</div>

<div class="form-group">
<label for="phone">Phone Number </label>
<input type="tel" id="phone" name="phone" placeholder="Enter 10 digit number" maxlength="10">
</div>

<div class="form-group">
<label for="pass">Password</label>
<input type="password" id="pass" name="pass"  placeholder="Minimum 6 characters">
</div>

<div class="form-group">
<label for="cpass">Confirm Password</label>
<input type="password" id="cpass" name="cpass" placeholder="Re-enter password">
</div>

<div class="check">
<input type="checkbox"  id="agree">
<label for="agree">I agree to the Terms of Service & Privacy Policy</label>
</div>

<button type="submit" class="btn">Create Account</button>

</form>

<p id="success" class="success">Account Created Successfully!</p>
</div>
</div>



  <!--Script Link-->
  <script src="register.js"></script>
</body>
</html>
