<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>
  <!--Stylesheet Link-->
  <link rel="stylesheet" href="register.css">
  
</head>
<body class="main">
  
<div class="card">

<!--Left Side-->
<div class="left">
<img src="./image/register.jpg" alt="Books">
<p>Join 10,000+ Book Lovers!</p>
</div>

<!--Right Side-->
<div class="right">
<h1>Create Your Account</h1>
<p>Already have an account? <a href="login.html">Login here</a></p>

<form id="regform">

  <div class="row">
<div class="form-group">
<label for="fname">First Name</label>
<input type="text" id="fname" name="fname" placeholder="John">
</div>

<div class="form-group">
<label for="lname">Last Name</label>
<input type="text" id="lname" name="lname" placeholder="Doe">
</div>
</div>
<div class="form-group">
<label for="email">Email Address</label>
<input type="email" id="email" name="email" placeholder="example@gmail.com">
</div>

<div class="form-group">
<label for="phone">Phone Number </label>
<input type="tel" id="phone" name="phone" placeholder="Enter 10 digit number" maxlength="10">
</div>

<div class="form-group">
<label for="pass">Password</label>
<input type="password" id="pass" name="pass"  placeholder="Minimum 6 characters">
</div>

<div class="form-group">
<label for="cpass">Confirm Password</label>
<input type="password" id="cpass" name="cpass" placeholder="Re-enter password">
</div>

<div class="check">
<input type="checkbox"  id="agree">
<label for="agree">I agree to the Terms of Service & Privacy Policy</label>
</div>

<button type="submit" class="btn">Create Account</button>

</form>

<p id="success" class="success">Account Created Successfully!</p>
</div>
</div>



  <!--Script Link-->
  <script src="register.js"></script>
</body>
</html>
